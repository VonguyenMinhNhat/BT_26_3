name: Deploy App

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trien khai len DevOps Classroom
        run: |
          REPO="vonguyenminhnhat/vonguyenminhnhat"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy that bai. Xem chi tiet trong nhom log ben duoi."
            echo "::group::Chi tiet webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thanh cong."
          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

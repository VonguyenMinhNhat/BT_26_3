<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title th:text="${title}">VoNguyenMinhNhat</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      background: linear-gradient(135deg, #0c0f3b, #1c1f5c, #5a6cd2);
      color: #fff;
    }
    .card {
      max-width: 600px;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin-top: 0;
      letter-spacing: 0.1rem;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
    }
    .note {
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 th:text="${title}">VoNguyenMinhNhat</h1>
    <p th:text="${message}">Welcome to the default page.</p>
    <p class="note">Application is running on port 8080. Refresh to recheck status.</p>
  </div>
</body>
</html>
